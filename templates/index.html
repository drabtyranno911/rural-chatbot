<!DOCTYPE html>
<html>
<head>
    <title>Rural AI Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000000;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: #1e293b;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .header {
            padding: 15px;
            background: #334155;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            text-align: center;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 75%;
        }

        .user {
            background: #3b82f6;
            align-self: flex-end;
        }

        .bot {
            background: #475569;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #444;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
            background: #0f172a;
            color: white;
        }

        button {
            padding: 10px;
            background: #22c55e;
            border: none;
            cursor: pointer;
            color: white;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header"> Rural AI Assistant</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask something..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function addMessage(text, sender) {
    let chatBox = document.getElementById("chatBox");
    let msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value.trim();

    if (message === "") return;

    addMessage(message, "user");
    input.value = "";

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        addMessage(data.reply, "bot");
    });
}
</script>

</body>
</html>
