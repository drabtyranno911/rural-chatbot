<!DOCTYPE html>
<html>
<head>
    <title>Rural AI Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #000000;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: #000000;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            border: 1px solid #222;
        }

        .header {
            padding: 15px;
            background: #000000;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #222;
        }

        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background: #000000;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 75%;
        }

        .user {
            background: #2563eb;
            align-self: flex-end;
        }

        .bot {
            background: #222222;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #222;
            background: #000000;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
            background: #000000;
            color: white;
        }

        button {
            padding: 10px;
            background: #22c55e;
            border: none;
            cursor: pointer;
            color: white;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Rural AI Assistant</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask something..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function addMessage(text, sender) {
    let chatBox = document.getElementById("chatBox");
    let msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
    return msg;
}

function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value.trim();

    if (message === "") return;

    addMessage(message, "user");
    input.value = "";

    // Typing animation
    let typingMsg = addMessage("Typing", "bot");

    let dots = 0;
    let interval = setInterval(() => {
        dots = (dots + 1) % 4;
        typingMsg.innerText = "Typing" + ".".repeat(dots);
    }, 300);

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        clearInterval(interval);

        setTimeout(() => {
            typingMsg.remove();
            addMessage(data.reply, "bot");
        }, 800);
    });
}
</script>

</body>
</html>
